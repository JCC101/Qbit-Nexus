name: Build and Push Docker Image

# 触发条件：推送到 main 分支，或发布新的 Release (tag)
于:
  workflow_dispatch:      # <--- 新增这行：允许手动点击按钮运行
  push:
    分支: [ "main", "master" ]
  release:
    types: [ published ]

env:
  REGISTRY: ghcr.io
  # 使用 github.repository 变量自动获取 "agonie0v0/qbit-nexus"
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    
    # 必须设置写入 packages 的权限
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 QEMU 和 Buildx 以支持多架构构建 (可选，建议保留)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 GitHub 容器仓库
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 自动处理 Tag 和 Label
      # push 到 main 分支 -> 生成 :latest
      # 发布 v1.0.0 -> 生成 :1.0.0 和 :latest
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          标签: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}

      # 构建并推送
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 开启多架构支持 (x86 和 ARM64/Mac M1)，适合 NAS 用户
          platforms: linux/amd64,linux/arm64
          标签: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
